# NCERT website - Nginx server block
# Copy to /etc/nginx/sites-available/ncert.conf on the Ubuntu VM, then:
#   sudo ln -s /etc/nginx/sites-available/ncert.conf /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Website will be reachable //localhost:8080

server {
    listen 8080;
    listen [::]:8080;

    server_name localhost;

    root /var/www/ncert-website;   # copy this project's files here (index.html, css/, js/, assets/)
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    access_log /var/log/nginx/ncert.access.log;
    error_log  /var/log/nginx/ncert.error.log;
}
